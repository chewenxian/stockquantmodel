# ============================================
# 股票情报系统配置
# ============================================

# 系统设置
system:
  data_dir: "data"
  db_path: "data/stock_news.db"
  log_dir: "logs"

# 自选股列表文件
stocks_file: "stocks.csv"

# 数据采集
collector:
  # 采集频率（分钟）
  intervals:
    quick: 10         # 快速采集（新闻+行情）
    news: 15          # 财经新闻
    market: 5         # 行情数据（每次全部自选股）
    money_flow: 15    # 资金流向
    policy: 30        # 政策新闻
    announcement: 60  # 公司公告
    sentiment: 60     # 社交媒体情绪
    sina_news: 30     # 新浪财经新闻（7个板块）
    industry_boards: 15  # 行业板块排行

  # 数据源开关
  sources:
    eastmoney: true       # 东方财富（新闻+行情+资金+龙虎榜）
    sina: true            # 新浪财经（新闻+行情）
    xueqiu: true          # 雪球（新闻+情绪）
    cninfo: true          # 巨潮资讯（公司公告）
    cls: true             # 财联社（电报快讯）
    wallstreet: true      # 华尔街见闻
    tencent: true         # 腾讯证券
    jin10: true           # 金十数据（快讯）
    national_stat: true   # 国家统计局（宏观数据）
    sse: true             # 上交所公告
    szse: true            # 深交所公告
    bse: true             # 北交所公告
    stcn: true            # 证券时报
    10jqka: true          # 同花顺7x24快讯
    gov_policy: true      # 央行/发改委/工信部政策
    history_quotes: true   # 历史K线数据
    north_flow: true       # 北向资金流向
    margin_trading: true   # 融资融券数据
    guba_sentiment: true   # 股吧情绪
    bond_yield: true       # 国债收益率
    stock_hot: true        # 股票热度排行

# 分析模块
analyzer:
  provider: "deepseek"    # deepseek / openai
  model: "deepseek-chat"
  api_base: "https://api.deepseek.com"
  # API key 从环境变量读取 DEEPSEEK_API_KEY
  schedule: "0 16 * * 1-5"  # 交易日16:00

# 推送
notify:
  wechat: true           # 通过 OpenClaw 微信推送
  schedule: "30 16 * * 1-5"  # 交易日16:30推送日报

# 代理（国内访问 GitHub 需要）
proxy:
  http: "http://127.0.0.1:7897"
  https: "http://127.0.0.1:7897"
